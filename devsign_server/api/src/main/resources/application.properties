spring.application.name=api
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/devsign
spring.datasource.username=postgres
spring.datasource.password=11111111
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson: snake_case (see JacksonConfig.java)
spring.jackson.property-naming-strategy=SNAKE_CASE

# JWT
jwt.secret=devsign-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000

# Cookie (set to true in production with HTTPS)
app.cookie.secure=false
